  perspective: >
    Prior FM benchmark on breast H&E. Occupies the "free-reuse prognosis/ROR-P"
    slot we had considered (12 FM × ABMIL, CBCS train → TCGA-BRCA external), so it
    scoops the descriptive FM-benchmark angle and the recurrence-risk reuse angle.
    Evidence that H&E→molecular-marker/prognosis prediction is saturated.
priority:
  level: P0
  reason: >
    Cite as the standing FM benchmark demonstrating prediction saturation; do NOT
    re-run a plain FM×MIL breast benchmark. Our contribution is the substitution-cost
    decision frame, not another accuracy leaderboard.
