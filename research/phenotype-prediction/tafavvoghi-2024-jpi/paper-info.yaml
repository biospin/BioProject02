keywords:
  - computational pathology
  - breast cancer molecular subtyping
  - H&E whole-slide imaging
  - PAM50 (LumA / LumB / HER2-enriched / Basal-like)
  - tumor tile segmentation
  - one-vs-rest CNN
  - XGBoost aggregation
