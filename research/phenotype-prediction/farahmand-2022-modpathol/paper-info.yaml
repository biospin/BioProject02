  importance:
    level: 상
    perspective: >
      Head-to-head benchmark for the BIOP02 Paper C treatment-outcome anchor.
      Same modality (H&E tumor ROI), same target (trastuzumab / pCR response),
      overlapping Yale HER2 cohort lineage (TCIA HER2-TUMOR-ROIS). Their
      trastuzumab-response 5-fold CV AUC = 0.80 is the exact bar our H&E-derived
      anti-HER2 axis score must meet or beat.
priority:
  level: P0
  reason: >
    Defines the AUC bar (~0.80) and the direct comparison for our real
    treatment-outcome anchor. Our differentiation: interpretable axis score
    (not black-box CNN), cross-cancer substitution framing, prospective anchor.
