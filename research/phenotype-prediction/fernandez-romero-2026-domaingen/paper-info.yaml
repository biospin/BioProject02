importance:
  level: 상
  perspective: >
    NEAREST SCOOP for the former breast "Paper A". Same design as our descriptive
    predictive experiment (13 FM × 3 MIL, PAM50 + IHC, TCGA-BRCA CV → CPTAC
    external), same cost/assay-unavailability motivation, and it even reproduces
    our HER2 external-validation failure. This paper is the reason breast was
    demoted from a standalone predictive paper and absorbed into flagship Paper C
    (cost-of-substitution decision map).
priority:
