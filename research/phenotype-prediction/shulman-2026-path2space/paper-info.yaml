  reason: >
    Must be cited as nearest neighbour and explicitly differentiated by direction
    (their advocacy of prediction vs our audit of substitution failure points).
    Reconstruction route (H&E→ST→marker) is distinct from our direct route
    (H&E→phenotype→therapy, no ST).
