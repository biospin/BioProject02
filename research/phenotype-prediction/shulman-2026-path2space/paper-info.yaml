importance:
  level: 상
  perspective: >
    Closest "H&E × molecular × treatment-axis" prior work on ~976 TCGA-BRCA, BUT
    OPPOSITE DIRECTION: Path2Space ADVOCATES predicted-ST-derived spatial biomarkers
    (SPAND) as good/better than measured RNA/FISH for response prediction. We AUDIT
    the decision loss of substituting H&E for molecular tests. Contrast, not scoop.
priority:
