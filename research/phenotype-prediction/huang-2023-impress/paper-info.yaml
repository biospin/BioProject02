  importance:
    level: 상
    perspective: >
      TARGET-JOURNAL precedent (npj Precision Oncology) for H&E -> treatment-
      response prediction in breast cancer. Establishes the venue's expectation
      for interpretable-feature NAC-response models and an AUC band
      (HER2+ 0.90; TNBC 0.77 dev).
priority:
  level: P1
  reason: >
    Journal-fit exemplar (target venue) + interpretable-feature baseline +
    external-fragility evidence. Cited on 3 axes. CAUTION on numbers: both
    external AUCs rest on n=20/subtype (10 pCR/10 residual) so neither the
    HER2+ 0.90 nor the TNBC 0.59 is a robust bar — the TNBC dev-0.77 ->
    external-0.59 collapse is the salient fragility signal; the HER2+ 0.90
    must NOT be cited as a solid upper band. Classical LASSO logistic + LOOCV
    on 36 interpretable features (not end-to-end DL). Their HER2+ target = NAC
    (chemo±anti-HER2) with multiplex IHC co-registration, distinct in regimen
    AND modality from our H&E-only anti-HER2 axis anchor (Farahmand 0.80).
