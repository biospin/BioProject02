categorization:
  domain:
    - computational pathology
    - machine-learning rigor / validation methodology
    - algorithmic fairness in oncology
  use_case:
    - mandate site-disjoint (ideally site-preserved QP) splits for all phenotype models
    - site-classifier probe to quantify residual batch effect (Exp2)
    - reviewer-defense anchor for Critic check #1 (data leakage)
  importance:
    level: 상
    perspective: >
      BIOP02's STRONGEST rigor / leakage-defense anchor. THE canonical evidence
      that TCGA H&E deep-learning models exploit submitting-site signatures that
      survive stain normalization + augmentation, inflating accuracy for
      survival / mutation / stage prediction and leaking patient ancestry via
      site batch effect. Mandates site-aware splitting for our ER/PR/HER2/PAM50
      models and underpins Exp2 (site-stratified vs random split + site-classifier
      probe) — the shield Dawood/Tafavvoghi did NOT raise because they did not
      control for site. Maps directly onto Scientific Critic checklist item #1.
priority:
  level: P0
  reason: >
    Defines the non-negotiable split protocol (split_policy_v0) and the single
    most defensible methodological differentiator versus prior TCGA-BRCA H&E work.
