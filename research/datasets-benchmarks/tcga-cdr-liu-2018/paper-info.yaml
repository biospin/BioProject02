categorization:
  domain:
    - clinical data curation / survival analytics
    - precision oncology ground-truth labels
    - TCGA pan-cancer resource
  use_case:
    - authoritative OS/PFI/DFI/DSS survival labels for TCGA-BRCA patients
    - per-endpoint usability gate (which endpoint is valid to model for BRCA)
    - upstream harmonized label source joined into agents/data manifest
  importance:
    level: 상
    perspective: >
      LEAKAGE-SAFE CLINICAL / SURVIVAL LABEL SOURCE for BIOP02. TCGA-CDR is the
      harmonized, peer-reviewed upstream of the raw clinical_patient_brca.txt we
      already touched: it standardizes four endpoints (OS, PFI, DFI, DSS) across
      11,160 patients / 33 types and — critically — tells us WHICH endpoints are
      statistically usable per cancer type. For BRCA it recommends PFI and DFI and
      flags OS/DSS as event-poor (longer follow-up needed). This is the canonical
      ground truth for our survival labels and the defensible answer to a Critic
      asking "why this endpoint, why these censoring rules" — complementing the
      IHC (ER/PR/HER2) and PAM50 phenotype labels with outcome labels.
priority:
  level: P0
  reason: >
    Defines the survival label schema and endpoint-validity gate for any
    outcome-prediction work in BIOP02. Choosing OS for BRCA without TCGA-CDR's
    guidance would be a quiet leakage/underpowering error; this paper is the
    citation that locks endpoint selection (PFI/DFI for BRCA).
related:
  - paper_id: tcga-brca-2012
    relation: cohort-source
    note: >
      TCGA-BRCA (Nature 2012) defines the breast cohort + molecular subtypes;
      TCGA-CDR provides the harmonized survival outcomes for those same patients,
      keyed by bcr_patient_barcode.
  - paper_id: parker-2009-pam50
    relation: complementary-label
    note: >
      PAM50 supplies the molecular-subtype phenotype labels; TCGA-CDR supplies the
      orthogonal clinical-outcome (survival) labels. Together they form the dual
      label set (phenotype + outcome) our H&E models predict / stratify on.
  - paper_id: cptac-mertins-2016
    relation: external-validation-cohort
    note: >
      CPTAC-BRCA is our external validation cohort; TCGA-CDR's endpoint definitions
      and usability logic are the template for harmonizing CPTAC survival labels to
      match (avoiding train/test label-definition drift).
